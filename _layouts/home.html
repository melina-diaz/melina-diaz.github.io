---
layout: default
---

<h1>{{ site.title }}</h1>
<p>{{ site.description }}</p>

{% for post in site.posts %}
<div class="post-card">
  <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
  <p>{{ post.excerpt | strip_html }}</p>
  <a href="{{ post.url }}" class="read-more">Read more →</a>
</div>
{% endfor %}
